name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Login DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/php-k8s-app:${{ github.run_number }} .

    - name: Push Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/php-k8s-app:${{ github.run_number }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: SSH Deploy to K8s
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_KEY }}
        script: |
          export KUBECONFIG=/home/ubuntu/kubeconfig.yaml
          kubectl set image deployment/php-k8s-app php-k8s-app=${{ secrets.DOCKER_USERNAME }}/php-k8s-app:${{ github.run_number }}
          kubectl scale deployment/php-k8s-app --replicas=7
